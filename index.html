<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Melodix v4 — The Gritty Update</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0a0a0f;
  --surface:  #11111a;
  --surface2: #181825;
  --border:   #2a2a3d;
  --accent:   #7c3aed;
  --accent2:  #a855f7;
  --accent3:  #c084fc;
  --green:    #22c55e;
  --red:      #ef4444;
  --amber:    #f59e0b;
  --cyan:     #06b6d4;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --mono:     'Space Mono', monospace;
  --display:  'Syne', sans-serif;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--display);}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:56px 1fr 180px;height:100vh;gap:0}

/* ── TOPBAR ── */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:1rem;padding:0 1.2rem;
  position:relative;z-index:10;
}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;color:var(--accent3);margin-right:.5rem;}
.logo span{color:var(--muted);font-weight:400}
.logo sup{font-size:.55rem;color:var(--red);vertical-align:super;letter-spacing:.05em;}

#bass-pulse{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  opacity:.55;
}

.tb-sep{width:1px;height:24px;background:var(--border);margin:0 .3rem}

.btn{
  padding:.38rem .85rem;border-radius:5px;border:none;cursor:pointer;
  font-family:var(--display);font-size:.78rem;font-weight:700;letter-spacing:.04em;
  transition:all .15s;display:flex;align-items:center;gap:.4rem;
}
.btn-play{background:var(--green);color:#fff;}
.btn-play:hover{filter:brightness(1.15);}
.btn-stop{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-stop:hover{border-color:var(--muted);}
.btn-clear{background:var(--surface2);color:var(--red);border:1px solid var(--border);}
.btn-clear:hover{border-color:var(--red);}
.btn-export{background:var(--accent);color:#fff;}
.btn-export:hover{background:var(--accent2);}
.btn-generate{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;box-shadow:0 0 12px rgba(124,58,237,.4);}
.btn-generate:hover{filter:brightness(1.15);box-shadow:0 0 18px rgba(124,58,237,.6);}
.btn-generate-rhythm{background:linear-gradient(135deg,#d97706,#ef4444);color:#fff;}
.btn-generate-rhythm:hover{filter:brightness(1.12);}
.btn-random{background:linear-gradient(135deg,#0891b2,#7c3aed,#db2777);background-size:200%;color:#fff;animation:randShift 3s linear infinite;}
.btn-random:hover{filter:brightness(1.2);transform:scale(1.04);}
@keyframes randShift{0%{background-position:0%}100%{background-position:200%}}

.tb-label{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.tb-val{font-family:var(--mono);font-size:.85rem;color:var(--accent3);}

input[type=range]{
  -webkit-appearance:none;appearance:none;
  height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;width:80px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--accent2);cursor:pointer;
}

select{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:.35rem .6rem;font-family:var(--display);font-size:.78rem;
  cursor:pointer;outline:none;
}
select:focus{border-color:var(--accent);}

.play-head{
  width:10px;height:10px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse-dot 1s infinite;
  display:none;
}
.play-head.active{display:block;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

.beat-display{
  font-family:var(--mono);font-size:.85rem;color:var(--amber);
  min-width:40px;text-align:center;
}

/* ── PIANO ROLL ── */
.piano-roll-wrap{
  display:flex;overflow:hidden;position:relative;
  background:var(--bg);
}

.piano-keys{
  width:52px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:hidden;
}
.key{
  height:28px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:6px;border-bottom:1px solid var(--border);
  font-size:.62rem;font-family:var(--mono);color:var(--muted);
  user-select:none;position:relative;cursor:pointer;transition:background .1s;
}
.key.white{background:var(--surface);}
.key.black{background:#0d0d14;color:#555;}
.key.white:hover{background:var(--surface2);}
.key.black:hover{background:#151520;}
.key.playing{background:var(--accent) !important;color:#fff !important;}
.key-c{color:var(--accent3) !important;}

.grid-scroll{flex:1;overflow-x:auto;overflow-y:hidden;position:relative;}
.grid-inner{position:relative;}

canvas#grid{display:block;cursor:crosshair;}

/* playhead line */
.playhead-line{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--green);box-shadow:0 0 8px var(--green);
  pointer-events:none;z-index:5;opacity:0;transition:opacity .1s;
}
.playhead-line.active{opacity:1;}

/* ── BOTTOM — INSTRUMENTS + RHYTHM ── */
.bottom{
  background:var(--surface);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:180px 1fr 1fr;
  overflow:hidden;
}

/* Instrument panel */
.instrument-panel{
  border-right:1px solid var(--border);
  padding:.8rem;overflow-y:auto;
}

/* Genre panel */
.genre-panel{
  border-right:1px solid var(--border);
  padding:.8rem;overflow-y:auto;
}
.genre-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));
  gap:5px;
}
.genre-btn{
  padding:.45rem .3rem;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;
  font-family:var(--display);font-size:.68rem;font-weight:700;
  color:var(--muted);transition:all .18s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  line-height:1.2;
}
.genre-btn:hover{border-color:var(--accent2);color:var(--text);background:var(--surface);}
.genre-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 10px rgba(124,58,237,.45);}
.genre-btn .g-emoji{font-size:1.1rem;}
.genre-btn .g-bpm{font-size:.58rem;color:inherit;opacity:.7;font-family:var(--mono);}
.genre-btn.active .g-bpm{opacity:.85;}
.panel-title{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;}
.inst-btn{
  width:100%;text-align:left;padding:.45rem .7rem;border-radius:5px;border:none;cursor:pointer;
  font-family:var(--display);font-size:.8rem;font-weight:700;
  background:transparent;color:var(--muted);margin-bottom:.25rem;transition:all .15s;
  display:flex;align-items:center;gap:.5rem;
}
.inst-btn:hover{background:var(--surface2);color:var(--text);}
.inst-btn.active{background:var(--accent);color:#fff;}
.inst-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* Rhythm machine */
.rhythm-panel{padding:1rem;overflow-x:auto;}
.rhythm-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
.rhythm-label{font-size:.68rem;font-family:var(--mono);color:var(--muted);width:52px;flex-shrink:0;text-align:right;}
.rhythm-steps{display:flex;gap:3px;}
.step-btn{
  width:22px;height:22px;border-radius:3px;border:none;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border);
  transition:all .1s;position:relative;
}
.step-btn:hover{border-color:var(--muted);}
.step-btn.on{background:var(--accent2);border-color:var(--accent);box-shadow:0 0 6px rgba(168,85,247,.4);}
.step-btn.beat4{border-left:2px solid var(--border)!important;}
.step-btn.current{box-shadow:0 0 0 2px var(--amber)!important;}

.rhythm-vol{width:55px;}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Melodix <span>studio</span><sup>v4</sup></div>
  <div class="tb-sep"></div>
  <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶ Play</button>
  <button class="btn btn-stop" onclick="stopAll()">■ Stop</button>
  <div class="tb-sep"></div>
  <div>
    <div class="tb-label">BPM</div>
    <div style="display:flex;align-items:center;gap:.4rem">
      <input type="range" id="bpm-slider" min="40" max="200" value="100" oninput="setBPM(this.value)"/>
      <span class="tb-val" id="bpm-display">100</span>
    </div>
  </div>
  <div class="tb-sep"></div>
  <div>
    <div class="tb-label">Bars</div>
    <select id="bars-select" onchange="setBars(this.value)">
      <option value="2">2</option>
      <option value="4" selected>4</option>
      <option value="8">8</option>
      <option value="16">16</option>
    </select>
  </div>
  <div class="tb-sep"></div>
  <div>
    <div class="tb-label">Octavă</div>
    <div style="display:flex;align-items:center;gap:.3rem">
      <button class="btn btn-stop" style="padding:.3rem .6rem" onclick="shiftOctave(-1)">−</button>
      <span class="tb-val" id="oct-display">4</span>
      <button class="btn btn-stop" style="padding:.3rem .6rem" onclick="shiftOctave(1)">+</button>
    </div>
  </div>
  <div class="tb-sep"></div>
  <div>
    <div class="tb-label">Volume</div>
    <input type="range" id="vol-slider" min="0" max="100" value="70" oninput="setMasterVol(this.value)"/>
  </div>
  <div class="tb-sep"></div>
  <div class="play-head" id="play-dot"></div>
  <span class="beat-display" id="beat-display">1.1</span>
  <div style="margin-left:auto;display:flex;gap:.5rem;align-items:center">
    <div>
      <div class="tb-label">Scală</div>
      <select id="scale-select">
        <option value="major">Major</option>
        <option value="minor" selected>Minor</option>
        <option value="pentatonic">Pentatonic</option>
        <option value="blues">Blues</option>
        <option value="dorian">Dorian</option>
        <option value="phrygian">Phrygian</option>
        <option value="lydian">Lydian</option>
        <option value="mixolydian">Mixolydian</option>
      </select>
    </div>
    <div>
      <div class="tb-label">Tonică</div>
      <select id="root-select">
        <option value="0">C</option><option value="1">C#</option>
        <option value="2">D</option><option value="3">D#</option>
        <option value="4">E</option><option value="5">F</option>
        <option value="6">F#</option><option value="7">G</option>
        <option value="8">G#</option><option value="9">A</option>
        <option value="10">A#</option><option value="11">B</option>
      </select>
    </div>
    <div>
      <div class="tb-label">Stil</div>
      <select id="style-select">
        <option value="melodic">Melodic</option>
        <option value="arpeggio">Arpeggio</option>
        <option value="stepwise">Stepwise</option>
        <option value="sparse">Sparse</option>
        <option value="dense">Dense</option>
      </select>
    </div>
    <div class="tb-sep"></div>
    <button class="btn btn-generate" onclick="generateMelody()">✦ Generate</button>
    <button class="btn btn-generate-rhythm" onclick="generateRhythm()">🥁 Rhythm</button>
    <button class="btn btn-random" onclick="randomEverything()">🎲 Random</button>
    <div class="tb-sep"></div>
    <button class="btn btn-clear" onclick="clearAll()">✕ Clear</button>
    <button class="btn btn-export" onclick="exportMIDI()">⬇ Export</button>
  </div>
</div>

<!-- PIANO ROLL -->
<div class="piano-roll-wrap" id="roll-wrap">
  <canvas id="bass-pulse"></canvas>
  <div class="piano-keys" id="piano-keys"></div>
  <div class="grid-scroll" id="grid-scroll">
    <div class="grid-inner" id="grid-inner">
      <canvas id="grid"></canvas>
      <div class="playhead-line" id="playhead-line"></div>
    </div>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <!-- Instruments -->
  <div class="instrument-panel">
    <div class="panel-title">Instrument melodic</div>
    <div id="inst-list"></div>
  </div>

  <!-- GENRE PICKER -->
  <div class="genre-panel">
    <div class="panel-title">Gen muzical — one-click generate</div>
    <div class="genre-grid" id="genre-grid"></div>
  </div>

  <!-- Rhythm machine -->
  <div class="rhythm-panel">
    <div class="panel-title" style="margin-bottom:.5rem">Rhythm Machine — 16 pași</div>
    <div id="rhythm-rows"></div>
  </div>
</div>

</div><!-- /app -->

<script>
// ══════════════════════════════════════════════════════════
//  WEB AUDIO SETUP
// ══════════════════════════════════════════════════════════
const AC   = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.7;
masterGain.connect(AC.destination);

function setMasterVol(v){ masterGain.gain.value = v/100; }

// ── NOTE FREQUENCIES ──────────────────────────────────────
function noteFreq(midi){ return 440 * Math.pow(2, (midi - 69) / 12); }

// ══════════════════════════════════════════════════════════
//  v4: HUMANIZATION + SWING CONFIG
// ══════════════════════════════════════════════════════════
let humanize = {
  active:   false,       // activat de gen (hiphop, jazz)
  swing:    0,           // 0..0.08 sec — swing offset pe 16th impar
  velRand:  0,           // 0..0.35 — velocity randomness
  timingMs: 0,           // max ms offset aleatoriuq
};
let portamento = {
  active: false,         // manele mode
  time:   0.10,          // glide time în secunde
  lastFreq: 0,
};
let use808 = false;      // trap/drill mode
let last808Freq = 0;     // pentru slide 808

// Aplică humanization pe when + gain
function humanWhen(when, colIdx){
  if(!humanize.active) return when;
  // Swing: coloana impară (off-beat) se întârzie
  const swingOffset = (colIdx % 2 === 1) ? humanize.swing : 0;
  const timingJitter = (Math.random()*2-1) * (humanize.timingMs/1000);
  return when + swingOffset + timingJitter;
}
function humanGain(baseGain){
  if(!humanize.active) return baseGain;
  return baseGain * (1 - Math.random() * humanize.velRand);
}

// ══════════════════════════════════════════════════════════
//  INSTRUMENTS
// ══════════════════════════════════════════════════════════
const INSTRUMENTS = [
  { name:'Piano',     color:'#7c3aed', synth: synthPiano    },
  { name:'E.Piano',   color:'#2563eb', synth: synthEPiano   },
  { name:'Synth Lead',color:'#db2777', synth: synthLead     },
  { name:'Pad',       color:'#0891b2', synth: synthPad      },
  { name:'Bass',      color:'#16a34a', synth: synthBass     },
  { name:'Pluck',     color:'#d97706', synth: synthPluck    },
  { name:'Flute',     color:'#7c3aed', synth: synthFlute    },
  { name:'Strings',   color:'#be123c', synth: synthStrings  },
  { name:'808 Sub',   color:'#ef4444', synth: synth808      },
  { name:'Klapa 🌙',  color:'#f59e0b', synth: synthKlapa    },
];
let currentInst = 0;

function synthPiano(freq, when, dur, gain=1, col=0){
  const w=humanWhen(when,col), g2=humanGain(gain);
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='triangle'; o.frequency.value=freq;
  g.gain.setValueAtTime(0.6*g2,w);
  g.gain.exponentialRampToValueAtTime(0.001,w+Math.min(dur+0.5,2));
  o.connect(g);g.connect(masterGain);o.start(w);o.stop(w+Math.min(dur+0.6,2.2));
}
function synthEPiano(freq, when, dur, gain=1, col=0){
  const w=humanWhen(when,col), g2=humanGain(gain);
  const o1=AC.createOscillator(),o2=AC.createOscillator(),g=AC.createGain();
  o1.type='sine';o1.frequency.value=freq;
  o2.type='sine';o2.frequency.value=freq*2.756;
  const gm=AC.createGain();gm.gain.value=0.25;
  g.gain.setValueAtTime(0.5*g2,w);
  g.gain.exponentialRampToValueAtTime(0.001,w+Math.min(dur+0.8,2.5));
  o1.connect(g);o2.connect(gm);gm.connect(g);g.connect(masterGain);
  o1.start(w);o2.start(w);o1.stop(w+Math.min(dur+1,2.8));o2.stop(w+Math.min(dur+1,2.8));
}
function synthLead(freq, when, dur, gain=1, col=0){
  const w=humanWhen(when,col), g2=humanGain(gain);
  const o=AC.createOscillator(),f=AC.createBiquadFilter(),g=AC.createGain();
  o.type='sawtooth';o.frequency.value=freq;
  f.type='lowpass';f.frequency.value=2200;f.Q.value=4;
  g.gain.setValueAtTime(0.5*g2,w);g.gain.setValueAtTime(0.5*g2,w+dur*0.8);
  g.gain.exponentialRampToValueAtTime(0.001,w+dur+0.05);
  o.connect(f);f.connect(g);g.connect(masterGain);o.start(w);o.stop(w+dur+0.1);
}
function synthPad(freq, when, dur, gain=1, col=0){
  ['sawtooth','square'].forEach((type,i)=>{
    const o=AC.createOscillator(),g=AC.createGain(),flt=AC.createBiquadFilter();
    o.type=type;o.frequency.value=freq*(i?1.005:1);
    flt.type='lowpass';flt.frequency.value=900;
    g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(0.18*gain,when+0.12);
    g.gain.setValueAtTime(0.18*gain,when+dur-0.1);
    g.gain.linearRampToValueAtTime(0,when+dur+0.3);
    o.connect(flt);flt.connect(g);g.connect(masterGain);o.start(when);o.stop(when+dur+0.4);
  });
}
function synthBass(freq, when, dur, gain=1, col=0){
  const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
  o.type='sawtooth';o.frequency.value=freq/2;
  f.type='lowpass';f.frequency.value=400;f.Q.value=6;
  g.gain.setValueAtTime(0.8*gain,when);
  g.gain.exponentialRampToValueAtTime(0.001,when+Math.min(dur+0.1,0.8));
  o.connect(f);f.connect(g);g.connect(masterGain);o.start(when);o.stop(when+Math.min(dur+0.15,0.9));
}
function synthPluck(freq, when, dur, gain=1, col=0){
  const bufSize=AC.sampleRate*0.5,buf=AC.createBuffer(1,bufSize,AC.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,3);
  const src=AC.createBufferSource(),flt=AC.createBiquadFilter(),g=AC.createGain();
  src.buffer=buf;flt.type='bandpass';flt.frequency.value=freq;flt.Q.value=80;
  g.gain.setValueAtTime(1.2*gain,when);
  g.gain.exponentialRampToValueAtTime(0.001,when+Math.min(dur+0.4,1.5));
  src.connect(flt);flt.connect(g);g.connect(masterGain);src.start(when);src.stop(when+Math.min(dur+0.5,1.6));
}
function synthFlute(freq, when, dur, gain=1, col=0){
  const o=AC.createOscillator(),vib=AC.createOscillator(),vibG=AC.createGain(),g=AC.createGain();
  o.type='sine';o.frequency.value=freq;
  vib.type='sine';vib.frequency.value=5.5;vibG.gain.value=freq*0.012;
  g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(0.5*gain,when+0.06);
  g.gain.setValueAtTime(0.5*gain,when+dur-0.06);
  g.gain.linearRampToValueAtTime(0,when+dur+0.05);
  vib.connect(vibG);vibG.connect(o.frequency);o.connect(g);g.connect(masterGain);
  vib.start(when);o.start(when);vib.stop(when+dur+0.1);o.stop(when+dur+0.1);
}
function synthStrings(freq, when, dur, gain=1, col=0){
  ['sawtooth','sawtooth','sawtooth'].forEach((t,i)=>{
    const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
    o.type=t;o.frequency.value=freq*[1,1.002,0.998][i];
    f.type='lowpass';f.frequency.value=2000;
    g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(0.15*gain,when+0.18);
    g.gain.setValueAtTime(0.15*gain,when+dur-0.1);
    g.gain.linearRampToValueAtTime(0,when+dur+0.25);
    o.connect(f);f.connect(g);g.connect(masterGain);o.start(when);o.stop(when+dur+0.3);
  });
}

// ── v4: 808 SUB-BASS ENGINE ───────────────────────────────
function synth808(freq, when, dur, gain=1, col=0){
  const subFreq = freq / 2;           // octava joasă
  const slideTime = portamento.active ? portamento.time : 0.04;

  // Sub oscillator cu pitch slide
  const o1=AC.createOscillator(), o2=AC.createOscillator();
  const distCurve = makeDistortionCurve(80);
  const waveShape = AC.createWaveShaper();
  waveShape.curve = distCurve;
  waveShape.oversample = '4x';

  const flt=AC.createBiquadFilter(), g=AC.createGain();
  o1.type='sine'; o2.type='triangle';

  // Slide de la nota anterioară dacă diferența > jumătate de octavă
  const startFreq = (last808Freq && Math.abs(last808Freq-subFreq) > subFreq*0.3)
    ? last808Freq : subFreq;
  o1.frequency.setValueAtTime(startFreq, when);
  o1.frequency.exponentialRampToValueAtTime(subFreq, when + slideTime);
  o2.frequency.setValueAtTime(startFreq*2, when);
  o2.frequency.exponentialRampToValueAtTime(subFreq*2, when + slideTime);
  last808Freq = subFreq;

  flt.type='lowpass'; flt.frequency.value=280; flt.Q.value=3;

  // Sustain lung — caracteristic 808
  const sustainDur = Math.max(dur, secPerCol()*3);
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(1.1*gain, when+0.01);
  g.gain.setValueAtTime(1.0*gain, when+sustainDur*0.7);
  g.gain.exponentialRampToValueAtTime(0.001, when+sustainDur+0.15);

  const gSub=AC.createGain(); gSub.gain.value=0.7;
  const gHarm=AC.createGain(); gHarm.gain.value=0.2;

  o1.connect(gSub); gSub.connect(flt);
  o2.connect(gHarm); gHarm.connect(waveShape); waveShape.connect(flt);
  flt.connect(g); g.connect(masterGain);

  o1.start(when); o2.start(when);
  o1.stop(when+sustainDur+0.2); o2.stop(when+sustainDur+0.2);

  // Trigger bass pulse vizualizator
  triggerBassPulse(1.0);
}

function makeDistortionCurve(amount){
  const n=256, curve=new Float32Array(n);
  for(let i=0;i<n;i++){
    const x=i*2/n-1;
    curve[i]=(Math.PI+amount)*x/(Math.PI+amount*Math.abs(x));
  }
  return curve;
}

// ── v4: KLAPA / MANELE SYNTH cu portamento ────────────────
function synthKlapa(freq, when, dur, gain=1, col=0){
  const o1=AC.createOscillator(), o2=AC.createOscillator();
  const flt=AC.createBiquadFilter(), g=AC.createGain();
  const vib=AC.createOscillator(), vibG=AC.createGain();

  o1.type='sawtooth'; o2.type='sawtooth';

  // Portamento: glide de la frecvența anterioară
  const glideTime = portamento.active ? portamento.time : 0.01;
  const startF = portamento.lastFreq > 0 ? portamento.lastFreq : freq;
  o1.frequency.setValueAtTime(startF, when);
  o1.frequency.exponentialRampToValueAtTime(freq, when+glideTime);
  o2.frequency.setValueAtTime(startF*1.004, when);
  o2.frequency.exponentialRampToValueAtTime(freq*1.004, when+glideTime);
  portamento.lastFreq = freq;

  // Vibrato expresiv
  vib.type='sine'; vib.frequency.value=6.2;
  vibG.gain.value = freq * 0.018;
  vib.connect(vibG); vibG.connect(o1.frequency); vibG.connect(o2.frequency);

  flt.type='lowpass'; flt.frequency.value=1800; flt.Q.value=3.5;

  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(0.55*gain, when+0.04);
  g.gain.setValueAtTime(0.5*gain, when+dur*0.85);
  g.gain.exponentialRampToValueAtTime(0.001, when+dur+0.08);

  const gMix=AC.createGain(); gMix.gain.value=0.5;
  o1.connect(flt); o2.connect(gMix); gMix.connect(flt); flt.connect(g); g.connect(masterGain);

  vib.start(when); o1.start(when); o2.start(when);
  vib.stop(when+dur+0.15); o1.stop(when+dur+0.15); o2.stop(when+dur+0.15);
}

// ══════════════════════════════════════════════════════════
//  RHYTHM MACHINE
// ══════════════════════════════════════════════════════════
const DRUMS = [
  { name:'Kick',   color:'#ef4444', fn: drumKick   },
  { name:'Snare',  color:'#f59e0b', fn: drumSnare  },
  { name:'HH',     color:'#22c55e', fn: drumHH     },
  { name:'HH Open',color:'#06b6d4', fn: drumHHOpen },
  { name:'Clap',   color:'#a855f7', fn: drumClap   },
  { name:'Tom',    color:'#fb923c', fn: drumTom    },
];
const STEPS = 16;
let rhythmPattern = DRUMS.map(() => new Array(STEPS).fill(false));
let rhythmVol     = DRUMS.map(() => 0.8);

function drumKick(when, vol=1){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine'; o.frequency.setValueAtTime(160,when);
  o.frequency.exponentialRampToValueAtTime(40,when+0.08);
  g.gain.setValueAtTime(1.2*vol,when);
  g.gain.exponentialRampToValueAtTime(0.001,when+0.35);
  o.connect(g);g.connect(masterGain);o.start(when);o.stop(when+0.4);
}
function drumSnare(when, vol=1){
  const buf=AC.createBuffer(1,AC.sampleRate*0.2,AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
  src.buffer=buf; f.type='highpass';f.frequency.value=1500;
  g.gain.setValueAtTime(0.7*vol,when);g.gain.exponentialRampToValueAtTime(0.001,when+0.18);
  src.connect(f);f.connect(g);g.connect(masterGain);src.start(when);src.stop(when+0.22);
}
function drumHH(when, vol=1){
  const buf=AC.createBuffer(1,AC.sampleRate*0.05,AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
  src.buffer=buf; f.type='highpass';f.frequency.value=8000;
  g.gain.setValueAtTime(0.5*vol,when);g.gain.exponentialRampToValueAtTime(0.001,when+0.04);
  src.connect(f);f.connect(g);g.connect(masterGain);src.start(when);
}
function drumHHOpen(when, vol=1){
  const buf=AC.createBuffer(1,AC.sampleRate*0.4,AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
  src.buffer=buf; f.type='highpass';f.frequency.value=7000;
  g.gain.setValueAtTime(0.45*vol,when);g.gain.exponentialRampToValueAtTime(0.001,when+0.35);
  src.connect(f);f.connect(g);g.connect(masterGain);src.start(when);src.stop(when+0.4);
}
function drumClap(when, vol=1){
  [0,0.01,0.02].forEach(delay=>{
    const buf=AC.createBuffer(1,AC.sampleRate*0.08,AC.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    src.buffer=buf; f.type='bandpass';f.frequency.value=1200;f.Q.value=0.5;
    g.gain.setValueAtTime(0.55*vol,when+delay);g.gain.exponentialRampToValueAtTime(0.001,when+delay+0.1);
    src.connect(f);f.connect(g);g.connect(masterGain);src.start(when+delay);
  });
}
function drumTom(when, vol=1){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine'; o.frequency.setValueAtTime(120,when);
  o.frequency.exponentialRampToValueAtTime(55,when+0.12);
  g.gain.setValueAtTime(0.8*vol,when);g.gain.exponentialRampToValueAtTime(0.001,when+0.25);
  o.connect(g);g.connect(masterGain);o.start(when);o.stop(when+0.3);
}

// ══════════════════════════════════════════════════════════
//  PIANO ROLL STATE
// ══════════════════════════════════════════════════════════
const NOTE_HEIGHT = 28;
const BEAT_WIDTH  = 60;
let bars          = 4;
let bpm           = 100;
let baseOctave    = 4;

// Notes stored as {row, col, len} — col & len in 16th note units
let notes = [];

// Visible note range: C2 to C7 = MIDI 36..96
const MIDI_TOP  = 96; // C7
const MIDI_BOT  = 36; // C2
const NUM_ROWS  = MIDI_TOP - MIDI_BOT + 1; // 61

function midiToRow(midi){ return MIDI_TOP - midi; }
function rowToMidi(row) { return MIDI_TOP - row; }

function noteLabel(midi){
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return names[midi%12] + Math.floor(midi/12-1);
}
function isBlack(midi){ return [1,3,6,8,10].includes(midi%12); }

// Grid: 16th notes per bar = 4*4 = 16
let sixteenthsPerBar = 16;
function totalCols(){ return bars * sixteenthsPerBar; }
function colWidth()  { return BEAT_WIDTH; }
function gridW()     { return totalCols() * colWidth(); }
function gridH()     { return NUM_ROWS * NOTE_HEIGHT; }

// ── CANVAS ────────────────────────────────────────────────
const canvas = document.getElementById('grid');
const ctx    = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width  = gridW();
  canvas.height = gridH();
  document.getElementById('grid-inner').style.width  = gridW()+'px';
  document.getElementById('grid-inner').style.height = gridH()+'px';
}

function drawGrid(){
  const w=gridW(), h=gridH(), cw=colWidth();
  ctx.clearRect(0,0,w,h);

  // Row backgrounds
  for(let r=0;r<NUM_ROWS;r++){
    const midi=rowToMidi(r);
    const y=r*NOTE_HEIGHT;
    ctx.fillStyle = isBlack(midi) ? '#0e0e18' : '#12121e';
    ctx.fillRect(0,y,w,NOTE_HEIGHT);
    // C notes marker
    if(midi%12===0){
      ctx.fillStyle='rgba(124,58,237,.06)';
      ctx.fillRect(0,y,w,NOTE_HEIGHT);
    }
    // row border
    ctx.fillStyle='rgba(255,255,255,.04)';
    ctx.fillRect(0,y+NOTE_HEIGHT-1,w,1);
  }

  // Beat lines
  for(let c=0;c<=totalCols();c++){
    const x=c*cw;
    const isBar   = c%16===0;
    const isBeat  = c%4===0;
    ctx.fillStyle = isBar ? 'rgba(255,255,255,.18)' : isBeat ? 'rgba(255,255,255,.08)' : 'rgba(255,255,255,.03)';
    ctx.fillRect(x,0,isBar?2:1,h);

    // bar number
    if(isBar){
      ctx.fillStyle='rgba(100,116,139,.7)';
      ctx.font='10px Space Mono, monospace';
      ctx.fillText('Bar '+(c/16+1), x+4, 11);
    }
  }

  // Notes
  notes.forEach(n => {
    const x = n.col * cw;
    const y = n.row * NOTE_HEIGHT;
    const nw= n.len * cw - 2;
    const nh= NOTE_HEIGHT - 2;
    const inst = INSTRUMENTS[n.inst || 0];
    const col  = inst.color;

    // shadow
    ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.fillStyle=col+'cc';
    ctx.beginPath();
    ctx.roundRect(x+1,y+1,nw,nh,3);
    ctx.fill();
    ctx.shadowBlur=0;

    // label
    if(nw > 18){
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.font='bold 9px Space Mono, monospace';
      ctx.fillText(noteLabel(rowToMidi(n.row)),x+4,y+NOTE_HEIGHT-8);
    }
  });
}

// ── PIANO KEYS ────────────────────────────────────────────
function buildPianoKeys(){
  const wrap = document.getElementById('piano-keys');
  wrap.innerHTML='';
  for(let midi=MIDI_TOP; midi>=MIDI_BOT; midi--){
    const div = document.createElement('div');
    div.className = 'key ' + (isBlack(midi)?'black':'white');
    if(midi%12===0) div.classList.add('key-c');
    div.dataset.midi = midi;
    div.textContent  = midi%12===0 ? noteLabel(midi) : (isBlack(midi)?'':'');
    div.style.height = NOTE_HEIGHT+'px';
    div.addEventListener('mousedown', ()=>previewNote(midi));
    wrap.appendChild(div);
  }
  // Sync scroll
  document.getElementById('grid-scroll').addEventListener('scroll', e=>{
    wrap.scrollTop = e.target.scrollTop;
  });
  wrap.style.overflowY='hidden';
  wrap.style.height=(document.getElementById('roll-wrap').offsetHeight)+'px';
}

function previewNote(midi){
  if(AC.state==='suspended') AC.resume();
  const inst = INSTRUMENTS[currentInst];
  inst.synth(noteFreq(midi), AC.currentTime, 0.3, 0.7);
  // flash key
  const key = document.querySelector(`.key[data-midi="${midi}"]`);
  if(key){ key.classList.add('playing'); setTimeout(()=>key.classList.remove('playing'),200); }
}

// ── GRID INTERACTION ──────────────────────────────────────
let drawing = false, drawStart = null, drawNote = null, erasing = false;

canvas.addEventListener('mousedown', e=>{
  if(AC.state==='suspended') AC.resume();
  const {col, row} = posFromEvent(e);
  const existing = noteAt(col, row);
  if(existing){
    erasing=true; removeNote(existing); drawGrid(); return;
  }
  drawing=true;
  drawStart={col,row};
  drawNote={row, col, len:1, inst:currentInst};
  notes.push(drawNote);
  previewNote(rowToMidi(row));
  drawGrid();
});

canvas.addEventListener('mousemove', e=>{
  if(!drawing) return;
  const {col} = posFromEvent(e);
  const newLen = Math.max(1, col - drawStart.col + 1);
  if(newLen !== drawNote.len){ drawNote.len = newLen; drawGrid(); }
});

canvas.addEventListener('mouseup', ()=>{ drawing=false; erasing=false; drawNote=null; });
canvas.addEventListener('mouseleave',()=>{ drawing=false; });

function posFromEvent(e){
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  return {
    col: Math.floor(x / colWidth()),
    row: Math.floor(y / NOTE_HEIGHT),
  };
}
function noteAt(col, row){
  return notes.find(n => n.row===row && col>=n.col && col<n.col+n.len);
}
function removeNote(n){ notes = notes.filter(x=>x!==n); }

// ══════════════════════════════════════════════════════════
//  PLAYBACK ENGINE
// ══════════════════════════════════════════════════════════
let playing       = false;
let playStartAC   = 0;   // AC time when playback started
let currentCol    = 0;
let scheduleAhead = 0.1; // seconds to look ahead
let animFrame     = null;
let scheduledUntil= 0;

function secPerCol(){ return (60 / bpm) / 4; } // one 16th note

function togglePlay(){
  if(AC.state==='suspended') AC.resume();
  if(playing){ stopAll(); return; }
  playing        = true;
  currentCol     = 0;
  playStartAC    = AC.currentTime + 0.05;
  scheduledUntil = playStartAC;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('play-dot').classList.add('active');
  document.getElementById('playhead-line').classList.add('active');
  scheduleLoop();
  animLoop();
}

function stopAll(){
  playing = false;
  currentCol = 0;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('play-dot').classList.remove('active');
  document.getElementById('playhead-line').classList.remove('active');
  document.getElementById('beat-display').textContent = '1.1';
  document.getElementById('playhead-line').style.left = '0px';
  cancelAnimationFrame(animFrame);
}

function scheduleLoop(){
  if(!playing) return;
  const lookAhead = AC.currentTime + scheduleAhead;
  while(scheduledUntil < lookAhead){
    const col  = Math.round((scheduledUntil - playStartAC) / secPerCol()) % totalCols();
    const when = scheduledUntil;

    // Melody notes — pasăm col pentru humanization
    notes.filter(n => n.col === col).forEach(n => {
      const inst  = INSTRUMENTS[n.inst || 0];
      const hwhen = humanWhen(when, col);
      const hgain = humanGain(0.75);
      inst.synth(noteFreq(rowToMidi(n.row)), hwhen, n.len * secPerCol() * 0.92, hgain, col);
    });

    // Rhythm — kick declanșează bass pulse vizualizator
    const step = col % STEPS;
    DRUMS.forEach((d, di) => {
      if(rhythmPattern[di][step]){
        const vol = rhythmVol[di];
        // Humanize ușor și drumurile
        const dJitter = humanize.active ? (Math.random()*2-1)*0.008 : 0;
        const dVol    = humanize.active ? vol*(0.85+Math.random()*0.3) : vol;
        d.fn(when + dJitter, dVol);
        if(di === 0) triggerBassPulse(dVol); // kick
      }
    });

    scheduledUntil += secPerCol();
  }
  setTimeout(scheduleLoop, 25);
}

function animLoop(){
  if(!playing){ cancelAnimationFrame(animFrame); return; }
  const elapsed = AC.currentTime - playStartAC;
  const col = (elapsed / secPerCol()) % totalCols();
  const x   = col * colWidth();

  // Move playhead
  const line = document.getElementById('playhead-line');
  line.style.left = x + 'px';

  // Auto-scroll
  const scroll = document.getElementById('grid-scroll');
  const visible = scroll.clientWidth;
  if(x > scroll.scrollLeft + visible - 80) scroll.scrollLeft = x - 60;
  if(x < scroll.scrollLeft) scroll.scrollLeft = Math.max(0, x - 60);

  // Beat display
  const bar  = Math.floor(col/16)+1;
  const beat = Math.floor((col%16)/4)+1;
  document.getElementById('beat-display').textContent = bar+'.'+beat;

  // Highlight rhythm step
  const step = Math.floor(col) % STEPS;
  document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('current'));
  document.querySelectorAll(`.step-btn[data-step="${step}"]`).forEach(b=>b.classList.add('current'));

  animFrame = requestAnimationFrame(animLoop);
}

// ══════════════════════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════════════════════
function setBPM(v){ bpm=+v; document.getElementById('bpm-display').textContent=v; }

function setBars(v){
  bars=+v; resizeCanvas(); drawGrid();
  if(playing){ stopAll(); }
}

function shiftOctave(delta){
  baseOctave = Math.max(1, Math.min(7, baseOctave+delta));
  document.getElementById('oct-display').textContent = baseOctave;
  // scroll to octave
  const midi = baseOctave * 12 + 12;
  const row  = midiToRow(midi);
  const y    = row * NOTE_HEIGHT;
  document.getElementById('grid-scroll').scrollTop = y - 80;
}

function clearAll(){ notes=[]; drawGrid(); }

// ── RHYTHM ROWS ───────────────────────────────────────────
function buildRhythmPanel(){

  DRUMS.forEach((d, di)=>{
    const row = document.createElement('div');

    for(let s=0;s<STEPS;s++){
      const btn=document.createElement('button');

      btn.style.background= rhythmPattern[di][s] ? d.color+'99' : '';
      btn.style.borderColor= rhythmPattern[di][s] ? d.color : '';
      btn.onclick=()=>{
        rhythmPattern[di][s]=!rhythmPattern[di][s];
        btn.style.background= rhythmPattern[di][s] ? d.color+'99' : '';
        btn.style.borderColor= rhythmPattern[di][s] ? d.color : '';
        btn.classList.toggle('on', rhythmPattern[di][s]);
        if(rhythmPattern[di][s] && AC.state!=='suspended') d.fn(AC.currentTime+0.01, rhythmVol[di]);
      };
      steps.appendChild(btn);
    }
    // vol slider per drum
    const vol=document.createElement('input');
    vol.type='range'; vol.min=0; vol.max=100; vol.value=80;
    vol.className='rhythm-vol';

    row.appendChild(vol);

// ══════════════════════════════════════════════════════════
//  v4: BASS PULSE VISUALIZER
// ══════════════════════════════════════════════════════════
let bassPulseAmt  = 0;
let bassPulseDecay= 0.88;

function triggerBassPulse(vol=1){
  bassPulseAmt = Math.min(1, bassPulseAmt + vol * 0.9);
}

function initBassPulse(){
  const cvs = document.getElementById('bass-pulse');
  function resize(){
    cvs.width  = cvs.parentElement.offsetWidth;
    cvs.height = cvs.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const ctx2 = cvs.getContext('2d');

  function drawPulse(){
    const w = cvs.width, h = cvs.height;
    ctx2.clearRect(0,0,w,h);

    if(bassPulseAmt > 0.01){
      const r = Math.max(w,h) * 0.85 * bassPulseAmt;
      const cx=w/2, cy=h/2;

      // Inel exterior
      const grd=ctx2.createRadialGradient(cx,cy,r*0.3,cx,cy,r);
      grd.addColorStop(0, `rgba(124,58,237,${bassPulseAmt*0.18})`);
      grd.addColorStop(0.5,`rgba(219,39,119,${bassPulseAmt*0.10})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx2.fillStyle=grd;
      ctx2.beginPath();
      ctx2.arc(cx,cy,r,0,Math.PI*2);
      ctx2.fill();

      // Inel de contur
      ctx2.strokeStyle=`rgba(192,132,252,${bassPulseAmt*0.35})`;
      ctx2.lineWidth=2*bassPulseAmt;
      ctx2.beginPath();
      ctx2.arc(cx,cy,r*0.55,0,Math.PI*2);
      ctx2.stroke();

      bassPulseAmt *= bassPulseDecay;
    }
    requestAnimationFrame(drawPulse);
  }
  drawPulse();
}

// ══════════════════════════════════════════════════════════
//  MELODY GENERATOR  (v4 — cu Hijaz + density variation)
// ══════════════════════════════════════════════════════════

const SCALES = {
  major:      [0,2,4,5,7,9,11],
  minor:      [0,2,3,5,7,8,10],
  pentatonic: [0,2,4,7,9],
  blues:      [0,3,5,6,7,10],
  dorian:     [0,2,3,5,7,9,10],
  phrygian:   [0,1,3,5,7,8,10],
  lydian:     [0,2,4,6,7,9,11],
  mixolydian: [0,2,4,5,7,9,10],
  hijaz:      [0,1,4,5,7,8,10],   // v4: scală arabă autentică
  phryDom:    [0,1,4,5,7,8,11],   // v4: phrygian dominant (manele clasice)
};

// Rhythm patterns: arrays of [col_offset, duration] in 16th notes
const RHYTHM_PATTERNS = {
  melodic:  [[0,4],[4,2],[6,2],[8,4],[12,2],[14,2]],
  arpeggio: [[0,1],[2,1],[4,1],[6,1],[8,1],[10,1],[12,1],[14,1]],
  stepwise: [[0,2],[2,2],[4,2],[6,2],[8,2],[10,2],[12,2],[14,2]],
  sparse:   [[0,4],[6,2],[12,4]],
  dense:    [[0,1],[1,1],[2,1],[3,1],[4,2],[6,1],[7,1],[8,2],[10,1],[11,1],[12,2],[14,1],[15,1]],
};

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function rndInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function rndFloat(min,max){ return Math.random()*(max-min)+min; }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

function getScaleNotes(rootNote, scaleName, octaveMin=3, octaveMax=5){
  const intervals = SCALES[scaleName] || SCALES.minor;
  const notes = [];
  for(let oct=octaveMin; oct<=octaveMax; oct++){
    intervals.forEach(interval=>{
      const midi = oct*12 + rootNote + interval;
      if(midi >= MIDI_BOT && midi <= MIDI_TOP) notes.push(midi);
    });
  }
  return notes;
}

function generateMelody(){
  const scaleName = document.getElementById('scale-select').value;
  const rootNote  = parseInt(document.getElementById('root-select').value);
  const style     = document.getElementById('style-select').value;

  // Clear only melody notes (keep rhythm)
  notes = [];

  const scaleNotes = getScaleNotes(rootNote, scaleName, 3, 5);

  // v4: DENSITY VARIATION — 20% șansă să schimbe densitatea radical
  let activePat = rhythmPat;
  const densityRoll = Math.random();
  if(densityRoll < 0.10){
    // Ultra sparse — doar 2-3 note per bar
    activePat = [[0,6],[8,4]];
    showGenToast('✦ Sparse mode — breathing room');
  } else if(densityRoll < 0.20){
    // Asalt — note pe fiecare 16th
    activePat = Array.from({length:16},(_,i)=>[i,1]);
    showGenToast('✦ Dense mode — full assault');
  }
  const rhythmPat  = RHYTHM_PATTERNS[style];
  const totalSixteenths = totalCols();

  // Choose a tonal center — start on root, tend to return
  const rootMidis = scaleNotes.filter(m => m % 12 === rootNote);
  let lastMidi    = rnd(rootMidis) || scaleNotes[Math.floor(scaleNotes.length/2)];

  // Generate phrase by phrase (one bar = 16 sixteenths)
  for(let bar=0; bar<bars; bar++){
    const barOffset = bar * 16;

    // Pick rhythm for this bar — vary per bar for interest
    const pat = bar % 2 === 0 ? activePat : addRhythmVariation(activePat, style);

    // Decide if this bar is a "tension" bar or "resolve" bar
    const isResolve = bar === bars-1 || (bar>0 && Math.random()<0.3);

    pat.forEach(([colOff, len]) => {
      const absCol = barOffset + colOff;
      if(absCol + len > totalSixteenths) return;

      let midi;
      if(isResolve && colOff===0){
        // Start resolve bar on root
        midi = rnd(rootMidis) || lastMidi;
      } else {
        midi = pickNextNote(lastMidi, scaleNotes, style, colOff, isResolve, rootNote);
      }

      midi = clamp(midi, MIDI_BOT, MIDI_TOP);
      notes.push({ row: midiToRow(midi), col: absCol, len, inst: currentInst });
      lastMidi = midi;
    });
  }

  drawGrid();

  // Show toast
  const scaleName2 = document.getElementById('scale-select').value;
  const rootNames  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const rootDisp   = rootNames[parseInt(document.getElementById('root-select').value)];
  const style2     = document.getElementById('style-select').value;
  showGenToast(`✦ ${rootDisp} ${scaleName2} — ${style2}`);

  // Scroll to where notes are
  if(notes.length){
    const midRow = notes[Math.floor(notes.length/2)].row;
    const y = midRow * NOTE_HEIGHT;
    document.getElementById('grid-scroll').scrollTop = y - 120;
    document.getElementById('grid-scroll').scrollLeft = 0;
  }
}

function pickNextNote(lastMidi, scaleNotes, style, colOff, isResolve, rootNote){
  // Build weighted candidates based on style
  const idx    = scaleNotes.indexOf(lastMidi);
  const len    = scaleNotes.length;
  let candidates = [];

  if(style === 'arpeggio'){
    // Arpeggios: prefer jumps of 3rd/5th
    candidates = scaleNotes.filter(m => {
      const d = Math.abs(m - lastMidi);
      return d === 3 || d === 4 || d === 7 || d === 12;
    });
  } else if(style === 'stepwise'){
    // Stepwise: prefer half/whole steps
    candidates = scaleNotes.filter(m => {
      const d = Math.abs(m - lastMidi);
      return d <= 3;
    });
  } else if(style === 'dense'){
    // Dense: chromatic-ish, small steps
    candidates = scaleNotes.filter(m => Math.abs(m-lastMidi) <= 4);
  } else if(style === 'sparse'){
    // Sparse: larger leaps allowed
    candidates = scaleNotes.filter(m => {
      const d = Math.abs(m - lastMidi);
      return d >= 3 && d <= 12;
    });
  } else {
    // Melodic: mix — prefer steps but allow leaps
    const stepCands  = scaleNotes.filter(m => Math.abs(m-lastMidi) <= 4);
    const leapCands  = scaleNotes.filter(m => { const d=Math.abs(m-lastMidi); return d>=5&&d<=9; });
    // Weight stepwise 3x more likely
    candidates = [...stepCands,...stepCands,...stepCands,...leapCands];
  }

  // Add gravity: pull toward middle of scale
  const midMidi = scaleNotes[Math.floor(len/2)];
  if(lastMidi > midMidi + 12) candidates = candidates.filter(m => m <= lastMidi);
  if(lastMidi < midMidi - 12) candidates = candidates.filter(m => m >= lastMidi);

  // If resolve, bias toward root notes
  if(isResolve){
    const rootCands = candidates.filter(m => m%12===rootNote);
    if(rootCands.length) candidates = [...candidates, ...rootCands, ...rootCands];
  }

  if(!candidates.length) candidates = scaleNotes;
  return rnd(candidates);
}

function addRhythmVariation(pat, style){
  // Slightly modify rhythm for variety
  return pat.map(([col, len]) => {
    const jitter = Math.random() < 0.25 ? 1 : 0;
    const lenVar = Math.random() < 0.2 ? Math.max(1, len + rndInt(-1,1)) : len;
    return [col, lenVar];
  }).filter(([c,l]) => l > 0);
}

function generateRhythm(){
  const genreKeys = Object.keys(RHYTHM_PRESETS);
  const pick      = rnd(genreKeys);
  const preset    = RHYTHM_PRESETS[pick];

  // Reset rhythm
  rhythmPattern = DRUMS.map(() => new Array(STEPS).fill(false));

  if(preset === null){
    // Pure random
    DRUMS.forEach((d, di)=>{
      const density = rndFloat(0.2, 0.55);
      for(let s=0;s<STEPS;s++) rhythmPattern[di][s] = Math.random() < density;
    });
  } else {
    Object.entries(preset).forEach(([di, steps])=>{
      steps.forEach(s => { rhythmPattern[parseInt(di)][s] = true; });
    });
    // Add small random fills
    DRUMS.forEach((d,di)=>{
      if(Math.random()<0.3){
        const s = rndInt(0,15);
        rhythmPattern[di][s]=true;
      }
    });
  }

  // Rebuild rhythm panel UI
  buildRhythmPanel();

  // Flash feedback
  showGenToast(`Rhythm: ${pick.toUpperCase()}`);
}

}

  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'melodix_export.json';
  a.click();
}

// keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if(e.code==='Escape') stopAll();
  if(e.code==='Delete'||e.code==='Backspace') clearAll();
  if(e.code==='KeyG') generateMelody();
  if(e.code==='KeyT') generateRhythm();
  if(e.code==='KeyR') randomEverything();  // R = Random tot
});

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
function init(){
  resizeCanvas();
  buildPianoKeys();
  buildInstPanel();
  buildGenrePanel();
  buildRhythmPanel();
  drawGrid();
  initBassPulse();

  // Adaugă scalele noi v4 în select
  const scaleSelect = document.getElementById('scale-select');
  if(!scaleSelect.querySelector('[value="hijaz"]')){
    [['hijaz','Hijaz (Arab)'],['phryDom','Phrygian Dom.']].forEach(([v,t])=>{
      const o=document.createElement('option'); o.value=v; o.textContent=t;
      scaleSelect.appendChild(o);
    });
  }

  setTimeout(()=>{
    const row = midiToRow(60);
    document.getElementById('grid-scroll').scrollTop = row*NOTE_HEIGHT - 120;
  }, 50);

  window.addEventListener('resize', ()=>{
    document.querySelector('.piano-keys').style.height = document.getElementById('roll-wrap').offsetHeight+'px';
  });
}

init();
</script>
