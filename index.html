<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>CodeQuest</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070f;
  --s1: #0e0e1c;
  --s2: #141428;
  --bd: #1e1e38;
  --g: #00ff88;
  --g2: #00cc66;
  --r: #ff3355;
  --y: #ffaa00;
  --b: #4488ff;
  --p: #aa44ff;
  --tx: #c8d8e8;
  --mu: #445566;
  --mono: 'JetBrains Mono', monospace;
  --ui: 'Syne', sans-serif;
}
body { background: var(--bg); color: var(--tx); font-family: var(--mono); height: 100vh; overflow: hidden; }

/* ── SCREENS ── */
.scr { display: none; height: 100vh; flex-direction: column; }
.scr.on { display: flex; }

/* ── BOOT ── */
#boot { align-items: center; justify-content: center; background: var(--bg); }
.terminal {
  width: min(640px, 94vw);
  background: var(--s1); border: 1px solid var(--g);
  border-radius: 4px; padding: 2rem;
  box-shadow: 0 0 40px rgba(0,255,136,.12);
}
#boot-log { min-height: 160px; margin-bottom: 1.5rem; }
.bl { font-size: .78rem; margin-bottom: .25rem; color: var(--g); }
.bl.dim { color: var(--mu); }
.bl.warn { color: var(--y); }
.bl.err { color: var(--r); }
.logo-txt {
  font-family: var(--ui); font-size: 2.2rem; font-weight: 800;
  color: var(--g); text-align: center; margin-bottom: .3rem;
  text-shadow: 0 0 24px rgba(0,255,136,.4);
}
.logo-sub { text-align: center; color: var(--mu); font-size: .7rem; letter-spacing: .2em; margin-bottom: 1.5rem; }
#boot-btn {
  display: block; width: 100%; padding: .9rem;
  background: none; border: 1px solid var(--g); color: var(--g);
  cursor: pointer; font-family: var(--mono); font-size: .85rem;
  letter-spacing: .12em; text-align: center; transition: all .2s;
}
#boot-btn:hover { background: rgba(0,255,136,.08); }

/* ── MAP ── */
#map { background: var(--bg); padding: 1rem; overflow-y: auto; }
.map-top {
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  background: var(--s1); border: 1px solid var(--bd); border-radius: 4px;
  padding: .6rem 1rem; margin-bottom: 1rem;
}
.map-logo { font-family: var(--ui); font-size: 1rem; font-weight: 800; color: var(--g); }
.hud { font-size: .72rem; }
.hud span { color: var(--g); font-weight: 700; }
.hearts { display: inline-flex; gap: 2px; }
.ht { color: var(--r); font-size: .85rem; }
.ht.off { opacity: .2; }
.map-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .6rem;
}
.card {
  background: var(--s1); border: 1px solid var(--bd); border-radius: 6px;
  padding: 1rem; cursor: pointer; transition: all .2s; position: relative;
}
.card:hover:not(.locked) { border-color: var(--g); box-shadow: 0 0 12px rgba(0,255,136,.1); }
.card.done { border-color: rgba(0,255,136,.35); background: rgba(0,255,136,.03); }
.card.locked { opacity: .3; cursor: default; }
.card.next { border-color: var(--y); }
.c-lang { font-size: .58rem; font-weight: 700; letter-spacing: .12em; margin-bottom: .4rem; }
.c-lang.html { color: var(--y); }
.c-lang.css  { color: var(--b); }
.c-lang.js   { color: var(--p); }
.c-lang.py   { color: var(--g); }
.c-lang.cpp  { color: var(--r); }
.c-title { font-size: .8rem; font-weight: 700; color: var(--tx); margin-bottom: .2rem; }
.c-sub { font-size: .65rem; color: var(--mu); }
.c-done-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: .6rem; color: var(--g); background: rgba(0,255,136,.12);
  padding: 1px 5px; border-radius: 3px;
}
.diff-dots { display: flex; gap: 3px; margin-top: .5rem; }
.dd { width: 6px; height: 6px; border-radius: 50%; background: var(--bd); }
.dd.on { background: var(--y); }

/* ── GAME ── */
#game { display: none; flex-direction: row; }
#game.on { display: flex; }
.gl { display: flex; flex-direction: column; flex: 1; min-width: 0; border-right: 1px solid var(--bd); }
.gr { display: flex; flex-direction: column; width: 380px; min-width: 280px; background: var(--s1); }

/* topbar */
.gtop {
  height: 46px; background: var(--s1); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0;
}
.back-btn {
  padding: 3px 9px; border: 1px solid var(--bd); background: none;
  color: var(--mu); cursor: pointer; font-family: var(--mono); font-size: .68rem;
  border-radius: 3px; transition: all .15s;
}
.back-btn:hover { color: var(--tx); border-color: var(--tx); }
.g-badge {
  font-size: .6rem; font-weight: 700; padding: 2px 7px; border-radius: 3px;
}
.g-title { font-size: .75rem; font-weight: 700; color: var(--tx); }
.g-right-hud { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.g-score { font-size: .7rem; color: var(--g); }
.g-hearts { display: flex; gap: 2px; }
.g-ht { font-size: .8rem; color: var(--r); }
.g-ht.off { opacity: .2; }
.g-timer { font-size: .9rem; font-weight: 700; color: var(--y); min-width: 38px; text-align: right; }
.g-timer.danger { color: var(--r); animation: blink .5s infinite; }
@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:.3 } }

/* story bar */
.story-bar {
  padding: 8px 12px; background: var(--s2); border-bottom: 1px solid var(--bd);
  flex-shrink: 0; display: flex; gap: 12px; align-items: flex-start;
}
.story-left { flex: 1; }
.story-alert { font-size: .68rem; color: var(--y); font-weight: 700; margin-bottom: 2px; }
.story-txt { font-size: .68rem; color: var(--mu); line-height: 1.5; }
.story-obj {
  font-size: .66rem; color: var(--g); flex-shrink: 0; max-width: 200px;
  background: rgba(0,255,136,.05); border: 1px solid rgba(0,255,136,.18);
  border-radius: 4px; padding: 5px 8px; line-height: 1.5;
}

/* code area */
.code-hdr {
  height: 30px; background: var(--s1); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0;
}
.fname { font-size: .65rem; color: var(--mu); background: var(--s2); padding: 1px 7px; border-radius: 3px; border: 1px solid var(--bd); }
.bug-badge { font-size: .6rem; color: var(--r); background: rgba(255,51,85,.12); border: 1px solid rgba(255,51,85,.25); padding: 1px 6px; border-radius: 3px; }
.line-info { margin-left: auto; font-size: .6rem; color: var(--mu); }
.editor-wrap { flex: 1; display: flex; overflow: hidden; }
.lnums {
  background: #030308; padding: 10px 8px 10px 6px; font-size: .78rem;
  line-height: 1.75; color: var(--mu); text-align: right; user-select: none;
  border-right: 1px solid var(--bd); flex-shrink: 0; overflow: hidden; min-width: 36px;
  white-space: pre;
}
#ged {
  flex: 1; background: #030308; color: var(--tx); border: none; outline: none;
  resize: none; font-family: var(--mono); font-size: .78rem; line-height: 1.75;
  padding: 10px 12px; tab-size: 2; caret-color: var(--g);
}
.code-foot {
  height: 36px; background: var(--s1); border-top: 1px solid var(--bd);
  display: flex; align-items: center; padding: 0 10px; gap: 6px; flex-shrink: 0;
}
.fb {
  padding: 3px 9px; border: 1px solid var(--bd); background: none;
  color: var(--mu); cursor: pointer; font-family: var(--mono);
  font-size: .65rem; border-radius: 3px; transition: all .15s;
}
.fb:hover { border-color: var(--y); color: var(--y); }
.fb.run { background: var(--g); color: #000; border-color: var(--g); font-weight: 700; }
.fb.run:hover { background: var(--g2); }

/* right panel */
.rtabs { display: flex; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.rtab {
  flex: 1; padding: 8px 0; border: none; background: none; color: var(--mu);
  cursor: pointer; font-family: var(--mono); font-size: .65rem;
  border-bottom: 2px solid transparent; transition: all .15s;
}
.rtab.on { color: var(--g); border-bottom-color: var(--g); }
.rpanel { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.rpanel.on { display: flex; }
#gprev { flex: 1; border: none; background: #fff; }
#gcon { flex: 1; overflow-y: auto; padding: 8px 10px; font-size: .73rem; }
#gcon::-webkit-scrollbar { width: 3px; }
#gcon::-webkit-scrollbar-thumb { background: var(--bd); }
.cl { padding: 1px 0; }
.cl.ok { color: var(--g); }
.cl.er { color: var(--r); }
.cl.inf { color: var(--b); }
.cl.wa { color: var(--y); }
.cempty { color: var(--mu); padding: 2rem; text-align: center; font-size: .72rem; }
#gexp { flex: 1; overflow-y: auto; padding: 10px 12px; }
#gexp::-webkit-scrollbar { width: 3px; }
.es { margin-bottom: 14px; }
.el { font-size: .58rem; letter-spacing: .15em; text-transform: uppercase; color: var(--g); margin-bottom: 5px; }
.et { font-size: .73rem; color: rgba(200,216,232,.72); line-height: 1.65; }
.wc { background: rgba(170,68,255,.07); border: 1px solid rgba(170,68,255,.2); border-radius: 5px; padding: 8px 10px; margin: 6px 0; }
.wq { font-size: .62rem; color: var(--p); font-weight: 700; margin-bottom: 3px; }
.wa2 { font-size: .71rem; color: rgba(200,216,232,.68); line-height: 1.6; }
.ec { background: rgba(0,0,0,.4); border: 1px solid var(--bd); border-radius: 3px; padding: 7px 9px; margin: 5px 0; font-size: .7rem; color: var(--g); white-space: pre-wrap; overflow-x: auto; }

/* result overlay */
#res-overlay { display: none; position: fixed; inset: 0; background: rgba(4,4,12,.9); z-index: 900; align-items: center; justify-content: center; }
#res-overlay.on { display: flex; }
.res-box { background: var(--s2); border: 1px solid var(--bd); border-radius: 8px; padding: 2rem; text-align: center; width: min(440px, 92vw); }
.res-icon { font-size: 3.5rem; margin-bottom: .8rem; }
.res-title { font-family: var(--ui); font-size: 1.5rem; font-weight: 800; margin-bottom: .4rem; }
.res-title.win { color: var(--g); }
.res-title.lose { color: var(--r); }
.res-msg { font-size: .78rem; color: var(--mu); line-height: 1.6; margin-bottom: 1.2rem; }
.res-stats { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.2rem; }
.rs { background: rgba(0,0,0,.3); padding: .7rem 1rem; border-radius: 5px; text-align: center; }
.rs-v { font-size: 1.3rem; font-weight: 700; color: var(--g); display: block; }
.rs-v.red { color: var(--r); }
.rs-l { font-size: .58rem; color: var(--mu); letter-spacing: .1em; text-transform: uppercase; }
.res-btns { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; }
.rb { padding: .55rem 1.2rem; border-radius: 4px; cursor: pointer; font-family: var(--mono); font-size: .75rem; }
.rb.p { background: var(--g); color: #000; border: none; font-weight: 700; }
.rb.p:hover { background: var(--g2); }
.rb.s { background: none; border: 1px solid var(--bd); color: var(--tx); }
.rb.s:hover { border-color: var(--tx); }

/* hint popup */
.hint-pop {
  position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
  background: rgba(255,170,0,.1); border: 1px solid var(--y); color: var(--y);
  padding: .7rem 1.2rem; border-radius: 5px; font-size: .75rem;
  max-width: 500px; text-align: center; z-index: 500;
  animation: slideUp .3s ease; pointer-events: none;
}
@keyframes slideUp { from { opacity:0;transform:translateX(-50%) translateY(8px) } to { opacity:1;transform:translateX(-50%) translateY(0) } }

.toast-msg {
  position: fixed; top: 56px; right: 16px; z-index: 600;
  padding: .5rem 1rem; border-radius: 4px; font-size: .72rem; pointer-events: none;
  animation: toastIn .3s ease;
}
.toast-msg.g { background: rgba(0,255,136,.12); border: 1px solid var(--g); color: var(--g); }
.toast-msg.r { background: rgba(255,51,85,.12); border: 1px solid var(--r); color: var(--r); }
@keyframes toastIn { from { opacity:0;transform:translateX(12px) } to { opacity:1;transform:translateX(0) } }

.flash-g { animation: fg .4s ease; }
.flash-r { animation: fr .4s ease; }
@keyframes fg { 0%,100% { box-shadow:none } 50% { box-shadow: 0 0 40px rgba(0,255,136,.4) inset; } }
@keyframes fr { 0%,100% { box-shadow:none } 50% { box-shadow: 0 0 40px rgba(255,51,85,.4) inset; } }
</style>
</head>
<body>

<!-- BOOT -->
<div class="scr on" id="boot">
  <div class="terminal">
    <div id="boot-log"></div>
    <div class="logo-txt">CodeQuest</div>
    <div class="logo-sub">HACK THE SYSTEM &bull; LEARN BY BREAKING THINGS</div>
    <button id="boot-btn" onclick="goMap()" style="display:none">[ PORNESTE SISTEMUL ]</button>
  </div>
</div>

<!-- MAP -->
<div class="scr" id="map">
  <div class="map-top">
    <span class="map-logo">&#11042; CodeQuest</span>
    <span class="hud">SCOR <span id="map-score">0</span></span>
    <span class="hud">VIETI <span class="hearts" id="map-hearts"></span></span>
    <span class="hud" style="margin-left:auto">COMPLETAT <span id="map-prog">0/0</span></span>
  </div>
  <div style="text-align:center;font-size:.62rem;letter-spacing:.2em;color:var(--mu);margin-bottom:.6rem;text-transform:uppercase">&#9656; Selecteaza o misiune &#9666;</div>
  <div class="map-grid" id="map-grid"></div>
</div>

<!-- GAME -->
<div class="scr" id="game">
  <div class="gl">
    <!-- topbar -->
    <div class="gtop">
      <button class="back-btn" onclick="goMap()">&#8592; Harta</button>
      <span class="g-badge" id="g-badge">HTML</span>
      <span class="g-title" id="g-title">-</span>
      <div class="g-right-hud">
        <span class="g-score" id="g-score">0 pts</span>
        <div class="g-hearts" id="g-hearts"></div>
        <span class="g-timer" id="g-timer">-</span>
      </div>
    </div>
    <!-- story -->
    <div class="story-bar">
      <div class="story-left">
        <div class="story-alert">&#9888; SITUATIE CRITICA</div>
        <div class="story-txt" id="g-story">-</div>
      </div>
      <div class="story-obj" id="g-obj">-</div>
    </div>
    <!-- code header -->
    <div class="code-hdr">
      <span class="fname" id="g-fname">main.html</span>
      <span class="bug-badge" id="g-bugs">0 bug-uri</span>
      <span class="line-info" id="g-lines">0 linii</span>
    </div>
    <!-- editor -->
    <div class="editor-wrap">
      <div class="lnums" id="lnums">1</div>
      <textarea id="ged" spellcheck="false" oninput="edChange()" onkeydown="edKey(event)"></textarea>
    </div>
    <!-- footer -->
    <div class="code-foot">
      <button class="fb" onclick="doHint()">&#128161; Hint</button>
      <button class="fb" onclick="doShowCode()">&#128065; Cod corect</button>
      <button class="fb" onclick="doReset()">&#8635; Reset</button>
      <button class="fb" onclick="doExplain()">&#128269; De ce?</button>
      <button class="fb run" onclick="doRun()">&#9654; Run &amp; Check</button>
    </div>
  </div>
  <!-- right panel -->
  <div class="gr">
    <div class="rtabs">
      <button class="rtab on" onclick="showRtab('prev',this)">Preview</button>
      <button class="rtab" onclick="showRtab('con',this)">Console</button>
      <button class="rtab" onclick="showRtab('exp',this)">De ce?</button>
    </div>
    <div class="rpanel on" id="rp-prev"><iframe id="gprev" sandbox="allow-scripts allow-same-origin"></iframe></div>
    <div class="rpanel" id="rp-con"><div id="gcon"><div class="cempty">// apasa Run &amp; Check</div></div></div>
    <div class="rpanel" id="rp-exp"><div id="gexp"><div class="cempty">// apasa "De ce?" dupa ce rulezi</div></div></div>
  </div>
</div>

<!-- RESULT -->
<div id="res-overlay">
  <div class="res-box">
    <div class="res-icon" id="ri"></div>
    <div class="res-title" id="rt"></div>
    <div class="res-msg" id="rm"></div>
    <div class="res-stats" id="rs"></div>
    <div class="res-btns" id="rb"></div>
  </div>
</div>

<script>
// =====================================================
//  MISSIONS DATA
// =====================================================
var M = [];

// ── HTML ──────────────────────────────────────────────
M.push({
  id:'h1', lang:'html', diff:1, file:'index.html', time:120,
  title:'Tag-urile sunt sparte',
  story:'Serverul orasului nu mai afiseaza titlul. 50.000 de oameni nu vad informatiile.',
  obj:'Repara tag-urile h1 sa apara titlul corect.',
  bugs:['<h1Titlul.../h1> - lipsesc < si > in jurul tag-urilor'],
  hint:'Tag-urile HTML au forma <tag>continut</tag>. Verifica simbolurile < si > de la h1.',
  broken:[
    '<!DOCTYPE html>',
    '<html>',
    '<head><title>Sistem Civic</title></head>',
    '<body>',
    '  <h1Titlul nu mai apare!/h1>',
    '  <p>Sistemul civic al orasului</p>',
    '</body>',
    '</html>'
  ].join('\n'),
  fixed:[
    '<!DOCTYPE html>',
    '<html>',
    '<head><title>Sistem Civic</title></head>',
    '<body>',
    '  <h1>Titlul nu mai apare!</h1>',
    '  <p>Sistemul civic al orasului</p>',
    '</body>',
    '</html>'
  ].join('\n'),
  check: function(c){ return c.indexOf('<h1>') !== -1 && c.indexOf('</h1>') !== -1; },
  why:[
    {q:'De ce browserul nu afiseaza nimic?', a:'Browserul parseaza HTML ca un arbore. Daca gaseste <h1Titlul, nu recunoaste ca tag valid si il ignora sau il trateaza ca text.'},
    {q:'De ce tag-urile au < si >?', a:'Tim Berners-Lee a ales < > in 1991 pentru ca nu apareau in textul documentelor. Sintaxa a ramas neschimbata 30+ ani.'}
  ]
});

M.push({
  id:'h2', lang:'html', diff:1, file:'nav.html', time:130,
  title:'Link-urile sunt moarte',
  story:'Reteaua interna: toate link-urile nu functioneaza. Sistemul de navigare e compromis.',
  obj:'Repara cele 3 link-uri sa aiba href-uri corecte.',
  bugs:['href="" - lipseste URL-ul', 'hreff typo pe al doilea', 'ghileaua lipsa pe al treilea'],
  hint:'Fiecare <a> are nevoie de href="URL". Cauta: URL-uri lipsa, typo "hreff", ghilimele nedeschise.',
  broken:[
    '<!DOCTYPE html>',
    '<html><body>',
    '  <h2>Navigare</h2>',
    '  <a href="">Google</a><br>',
    '  <a hreff="https://github.com">GitHub</a><br>',
    '  <a href="https://youtube.com target="_blank">YouTube</a>',
    '</body></html>'
  ].join('\n'),
  fixed:[
    '<!DOCTYPE html>',
    '<html><body>',
    '  <h2>Navigare</h2>',
    '  <a href="https://google.com">Google</a><br>',
    '  <a href="https://github.com">GitHub</a><br>',
    '  <a href="https://youtube.com" target="_blank">YouTube</a>',
    '</body></html>'
  ].join('\n'),
  check: function(c){ return c.indexOf('href="https://google.com"') !== -1 && c.indexOf('href="https://github.com"') !== -1 && c.indexOf('href="https://youtube.com"') !== -1; },
  why:[
    {q:'De ce href si nu src?', a:'href = hypertext reference - unde navighezi. src = source - resursa pe care o incarci. Tag-ul <a> foloseste href. Tag-ul <img> foloseste src. Nu sunt interschimbabile.'},
    {q:'Ce face target="_blank"?', a:'Deschide link-ul intr-un tab nou. Fara el, pagina curenta e inlocuita cu cea din link.'}
  ]
});

M.push({
  id:'h3', lang:'html', diff:2, file:'login.html', time:150,
  title:'Formularul nu trimite date',
  story:'Sistemul de securitate: nimeni nu poate face login. Formularul e stricat.',
  obj:'Repara type-urile: text, password, submit.',
  bugs:['type="txtt" typo', 'type="pasword" typo', 'type="sbumit" typo'],
  hint:'Sunt 3 typo-uri in atributele type="". Valorile corecte: text, password, submit.',
  broken:[
    '<!DOCTYPE html>',
    '<html>',
    '<head><title>Login</title>',
    '<style>body{font-family:sans-serif;padding:2rem;max-width:400px}',
    'input{display:block;width:100%;padding:8px;margin:8px 0;border:1px solid #ccc;border-radius:4px}',
    'button{padding:10px 20px;background:#4f46e5;color:white;border:none;border-radius:4px;cursor:pointer;width:100%}',
    '</style></head>',
    '<body>',
    '  <h2>Login Sistem</h2>',
    '  <form>',
    '    <label>Username</label>',
    '    <input type="txtt" name="username" placeholder="admin">',
    '    <label>Parola</label>',
    '    <input type="pasword" name="password">',
    '    <button type="sbumit">Autentifica-te</button>',
    '  </form>',
    '</body></html>'
  ].join('\n'),
  fixed:[
    '<!DOCTYPE html>',
    '<html>',
    '<head><title>Login</title>',
    '<style>body{font-family:sans-serif;padding:2rem;max-width:400px}',
    'input{display:block;width:100%;padding:8px;margin:8px 0;border:1px solid #ccc;border-radius:4px}',

var G = {
  score: 0,
  lives: 3,
  done: [],
  cur: null,
  timer: null,
  timeLeft: 0,
  hints: 0
};

function loadG() {
  try {
    var d = localStorage.getItem('cq3_done');
    if (d) G.done = JSON.parse(d);
    var s = localStorage.getItem('cq3_score');
    if (s) G.score = parseInt(s);
    var l = localStorage.getItem('cq3_lives');
    if (l) G.lives = parseInt(l);
    if (G.lives < 1) G.lives = 3;
  } catch(e) {}
}
function saveG() {
  try {
    localStorage.setItem('cq3_done', JSON.stringify(G.done));
    localStorage.setItem('cq3_score', G.score);
    localStorage.setItem('cq3_lives', G.lives);
  } catch(e) {}
}
function isDone(id) { return G.done.indexOf(id) !== -1; }
function markDone(id) { if (!isDone(id)) { G.done.push(id); saveG(); } }

// =====================================================
//  SCREENS
// =====================================================
function show(id) {
  var all = ['boot','map','game'];
  for (var i=0; i<all.length; i++) {
    var el = document.getElementById(all[i]);
    if (all[i] === id) { el.classList.add('on'); }
    else { el.classList.remove('on'); }
  }
}

function goMap() {
  stopTimer();
  buildMap();
  show('map');
}

// =====================================================
//  MAP
// =====================================================
function buildMap() {
  renderHearts(document.getElementById('map-hearts'), G.lives, 'ht');
  document.getElementById('map-score').textContent = G.score;
  document.getElementById('map-prog').textContent = G.done.length + '/' + M.length;

  var grid = document.getElementById('map-grid');
  grid.innerHTML = '';

  for (var i=0; i<M.length; i++) {
    var m = M[i];
    var done = isDone(m.id);
    var locked = i > 0 && !isDone(M[i-1].id);
    var isNext = !done && !locked;

    var c = document.createElement('div');
    c.className = 'card' + (done?' done':'') + (locked?' locked':'') + (isNext?' next':'');

    var dots = '';
    for (var d=0; d<3; d++) { dots += '<div class="dd' + (d < m.diff ? ' on' : '') + '"></div>'; }

    c.innerHTML = '<div class="c-lang ' + m.lang + '">' + m.lang.toUpperCase() + '</div>' +
      '<div class="c-title">' + (done ? '&#10003; ' : '') + m.title + '</div>' +
      '<div class="c-sub">' + m.story.substring(0, 55) + '...</div>' +
      '<div class="diff-dots">' + dots + '</div>' +
      (done ? '<span class="c-done-badge">REPARAT</span>' : '');

    if (!locked) {
      (function(mission){ c.onclick = function(){ startMission(mission); }; })(m);
    }
    grid.appendChild(c);
  }
}

function renderHearts(container, count, cls) {
  container.innerHTML = '';
  for (var i=0; i<3; i++) {
    var h = document.createElement('span');
    h.className = cls + (i >= count ? ' off' : '');
    h.textContent = '\u2665';
    container.appendChild(h);
  }
}

// =====================================================
//  START MISSION
// =====================================================
function startMission(m) {
  G.cur = m;
  G.hints = 0;

  document.getElementById('g-title').textContent = m.title;

  var badge = document.getElementById('g-badge');
  badge.textContent = m.lang.toUpperCase();
  var colors = {html:'rgba(255,170,0,.2)', css:'rgba(68,136,255,.2)', js:'rgba(170,68,255,.2)', py:'rgba(0,255,136,.15)', cpp:'rgba(255,51,85,.2)'};
  var txts   = {html:'#ffaa00', css:'#4488ff', js:'#aa44ff', py:'#00ff88', cpp:'#ff3355'};
  badge.style.background = colors[m.lang] || '';
  badge.style.color = txts[m.lang] || '';

  document.getElementById('g-story').textContent = m.story;
  document.getElementById('g-obj').textContent = '\u2192 ' + m.obj;
  document.getElementById('g-fname').textContent = m.file;
  document.getElementById('g-bugs').textContent = m.bugs.length + ' bug-uri detectate';

  document.getElementById('ged').value = m.broken;
  updateLN();
  clearCon();
  document.getElementById('gprev').srcdoc = '';
  document.getElementById('gexp').innerHTML = '<div class="cempty">// apasa "De ce?" pentru explicatii</div>';

  renderHearts(document.getElementById('g-hearts'), G.lives, 'g-ht');
  document.getElementById('g-score').textContent = G.score + ' pts';

  showRtab('prev', document.querySelector('.rtab'));
  startTimer(m.time);
  show('game');
}

// =====================================================
//  TIMER
// =====================================================
function startTimer(sec) {
  stopTimer();
  G.timeLeft = sec;
  renderTimer();
  G.timer = setInterval(function() {
    G.timeLeft--;
    renderTimer();
    if (G.timeLeft <= 15) document.getElementById('g-timer').classList.add('danger');
    if (G.timeLeft <= 0) { stopTimer(); loseLife('Timp expirat!'); }
  }, 1000);
}
function stopTimer() {
  clearInterval(G.timer);
  document.getElementById('g-timer').classList.remove('danger');
}
function renderTimer() {
  var m = Math.floor(G.timeLeft/60);
  var s = G.timeLeft % 60;
  document.getElementById('g-timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

// =====================================================
//  RUN & CHECK
// =====================================================
function doRun() {
  if (!G.cur) return;
  var code = document.getElementById('ged').value;
  var m = G.cur;

  if (m.lang === 'html' || m.lang === 'css' || m.lang === 'js') {
    document.getElementById('gprev').srcdoc = code;
    showRtab('prev', null);
  }
  if (m.lang === 'py') {
    clearCon();
    runPy(code);
    showRtab('con', null);
  }
  if (m.lang === 'cpp') {
    clearCon();
    runCpp(code);
    showRtab('con', null);
  }

  var ok = m.check(code);
  setTimeout(function() {
    if (ok) {
      winMission();
    } else {
      flashEl('r');
      addCon('Sistemul inca nu functioneaza. Verifica bug-urile!', 'wa');
      toast('Bug-uri inca prezente. Continua!', 'r');
    }
  }, m.lang === 'py' || m.lang === 'cpp' ? 50 : 350);
}

function winMission() {
  stopTimer();
  var tBonus = Math.floor(G.timeLeft * 2);
  var hPen   = G.hints * 30;
  var base   = G.cur.diff * 100;
  var earned = Math.max(base + tBonus - hPen, 10);
  G.score += earned;
  markDone(G.cur.id);
  saveG();
  flashEl('g');
  showResult(true, earned, tBonus, hPen);
}

function loseLife(reason) {
  G.lives--;
  if (G.lives < 0) G.lives = 0;
  saveG();
  flashEl('r');
  renderHearts(document.getElementById('g-hearts'), G.lives, 'g-ht');
  if (G.lives <= 0) {
    stopTimer();
    showResult(false, 0, 0, 0, reason + ' Fara vieti!');
  } else {
    toast(reason + ' Vieti ramase: ' + G.lives, 'r');
  }
}

// =====================================================
//  RESULT
// =====================================================
function showResult(win, earned, tBonus, hPen, msg) {
  document.getElementById('ri').textContent = win ? '\uD83C\uDF89' : '\uD83D\uDC80';
  var rt = document.getElementById('rt');
  rt.textContent = win ? 'Sistem reparat!' : 'Misiune esuata';
  rt.className = 'res-title ' + (win ? 'win' : 'lose');
  document.getElementById('rm').textContent = win
    ? 'Ai reparat "' + G.cur.title + '". Sistemul e stabil.'
    : (msg || 'Sistemul a ramas compromis.');

  var rs = document.getElementById('rs');
  rs.innerHTML = win
    ? '<div class="rs"><span class="rs-v">' + earned + '</span><span class="rs-l">Puncte</span></div>' +
      '<div class="rs"><span class="rs-v">+' + tBonus + '</span><span class="rs-l">Bonus timp</span></div>' +
      '<div class="rs"><span class="rs-v' + (hPen ? ' red' : '') + '">' + (hPen ? '-' + hPen : '0') + '</span><span class="rs-l">Hints</span></div>'
    : '';

  var rb = document.getElementById('rb');
  var curIdx = -1;
  for (var i=0; i<M.length; i++) { if (M[i].id === G.cur.id) { curIdx = i; break; } }
  var nextM = M[curIdx + 1];

  rb.innerHTML = '';
  if (win && nextM) {
    var nb = document.createElement('button');
    nb.className = 'rb p';
    nb.textContent = 'Urmatoarea \u2192';
    (function(nm){ nb.onclick = function(){ closeResult(); startMission(nm); }; })(nextM);
    rb.appendChild(nb);
  }
  var sb = document.createElement('button');
  sb.className = 'rb s';
  sb.textContent = '\u2190 Harta';
  sb.onclick = function(){ closeResult(); goMap(); };
  rb.appendChild(sb);

  if (!win) {
    var rb2 = document.createElement('button');
    rb2.className = 'rb p';
    rb2.textContent = 'Incearca din nou';
    (function(cm){ rb2.onclick = function(){ closeResult(); startMission(cm); }; })(G.cur);
    rb.insertBefore(rb2, sb);
  }

  document.getElementById('res-overlay').classList.add('on');
}
function closeResult() { document.getElementById('res-overlay').classList.remove('on'); }

function doHint() {
  if (!G.cur) return;

function doExplain() {
  if (!G.cur) return;

  var bs = document.createElement('div');
  bs.className = 'es';

function showRtab(name, btn) {
  var panels = ['prev','con','exp'];
  for (var i=0; i<panels.length; i++) {
    document.getElementById('rp-' + panels[i]).classList.remove('on');
  }
  document.querySelectorAll('.rtab').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById('rp-' + name).classList.add('on');
  document.querySelectorAll('.rtab').forEach(function(t){
    if ((name==='prev' && t.textContent==='Preview') ||
        (name==='con'  && t.textContent==='Console') ||
        (name==='exp'  && t.textContent==='De ce?')) t.classList.add('on');
  });
}

function runPy(code) {
  var vars = {};
  var lines = code.split('\n');
  var i = 0;
  while (i < lines.length) {
    var raw = lines[i++];
    var line = raw.trim();
    if (!line || line.charAt(0) === '#') continue;

    if (line.indexOf('print(') === 0) {
      try { addCon(pyEval(line.slice(6, -1), vars), 'ok'); } catch(e) {}
      continue;
    }

    // for i,v in enumerate(list, start):
    var fem = line.match(/^for\s+(\w+)\s*,\s*(\w+)\s+in\s+enumerate\((\w+)(?:,\s*(\d+))?\)\s*:/);
    if (fem) {
      var iv = fem[1], vv = fem[2], ln = fem[3], st = parseInt(fem[4]||0);
      var lst = vars[ln] || [];
      var blk = getBlk(lines, i);
      i += blk.length;
      for (var bi=0; bi<lst.length; bi++) {
        vars[iv] = bi+st; vars[vv] = lst[bi];
        for (var bj=0; bj<blk.length; bj++) {
          var bt = blk[bj].trim();
          if (bt.indexOf('print(') === 0) { try { addCon(pyEval(bt.slice(6,-1), vars), 'ok'); } catch(e) {} }
        }
      }
      continue;
    }

    // for v in list:
    var frl = line.match(/^for\s+(\w+)\s+in\s+(\w+)\s*:/);
    if (frl) {
      var vv2 = frl[1], ln2 = frl[2];
      var lst2 = vars[ln2] || [];
      var blk2 = getBlk(lines, i);
      i += blk2.length;
      for (var bi2=0; bi2<lst2.length; bi2++) {
        vars[vv2] = lst2[bi2];
        for (var bj2=0; bj2<blk2.length; bj2++) {
          var bt2 = blk2[bj2].trim();
          if (bt2.indexOf('print(') === 0) { try { addCon(pyEval(bt2.slice(6,-1), vars), 'ok'); } catch(e) {} }
        }
      }
      continue;
    }

    // assignment
    var asgn = line.match(/^(\w+)\s*=\s*(.+)$/);
    if (asgn) {
      var nm = asgn[1], ex = asgn[2].trim();
      if (ex.charAt(0) === '[') {
        try { vars[nm] = JSON.parse(ex.replace(/'/g,'"').replace(/True/g,'true').replace(/False/g,'false')); } catch(e) { vars[nm] = []; }
      } else if (ex.charAt(0) === '{') {
        try {
          var cleaned = ex.replace(/'/g,'"').replace(/True/g,'true').replace(/False/g,'false').replace(/(\w+)\s*:/g,'"$1":');
          vars[nm] = JSON.parse(cleaned);
        } catch(e) { vars[nm] = {}; }
      } else {
        try { vars[nm] = pyExpr(ex, vars); } catch(e) { vars[nm] = ex; }
      }
    }
  }
}

function getBlk(lines, start) {
  var b = [];
  for (var j=start; j<lines.length; j++) {
    if (lines[j].charAt(0) === ' ' || lines[j].charAt(0) === '\t') b.push(lines[j]);
    else if (lines[j].trim() === '') continue;
    else break;
  }
  return b;
}

function pyEval(inner, vars) {
  inner = (inner||'').trim();
  if (inner.indexOf('f"') === 0 || inner.indexOf("f'") === 0) {
    var s = inner.slice(2, -1).replace(/\\n/g, '\n');
    s = s.replace(/\{([^}]+)\}/g, function(_, e) {
      try { return String(pyExpr(e, vars)); } catch(err) { return e; }
    });
    return s;
  }
  if ((inner.charAt(0) === '"' && inner.charAt(inner.length-1) === '"') ||
      (inner.charAt(0) === "'" && inner.charAt(inner.length-1) === "'")) {
    return inner.slice(1,-1).replace(/\\n/g,'\n');
  }
  // string concat
  if (inner.indexOf('+') !== -1 && inner.indexOf('"') !== -1) {
    try { return String(pyExpr(inner, vars)); } catch(e) { return inner; }
  }
  try { return String(pyExpr(inner, vars)); } catch(e) { return inner; }
}

function pyExpr(expr, vars) {
  var e = (expr||'').trim()
    .replace(/\bTrue\b/g,'true').replace(/\bFalse\b/g,'false')
    .replace(/\blen\((\w+)\)/g, function(_,v){ var val=vars[v]; return Array.isArray(val)?val.length:(typeof val==='string'?val.length:0); });
  var keys = Object.keys(vars);
  for (var i=0; i<keys.length; i++) {
    var k = keys[i];
    e = e.replace(new RegExp('\\b'+k+'\\b','g'), JSON.stringify(vars[k]));
  }
  return Function('"use strict";return('+e+')')();
}

// =====================================================
//  C++ RUNNER
// =====================================================
function runCpp(code) {
  var vars = {};
  var declRe = /(int|double|float)\s+(\w+)\s*=\s*([^;]+);/g;
  var m;
  while ((m = declRe.exec(code)) !== null) {
    try { vars[m[2]] = Function('"use strict";return(' + m[3].trim() + ')')(); } catch(e) { vars[m[2]] = 0; }
  }
  var strRe = /string\s+(\w+)\s*=\s*"([^"]*)"/g;
  while ((m = strRe.exec(code)) !== null) { vars[m[1]] = m[2]; }

  var coutRe = /cout\s*<<\s*((?:"[^"]*"|[^;])+?)(?:<<\s*endl)?\s*;/g;
  while ((m = coutRe.exec(code)) !== null) {
    var parts = m[1].split('<<');
    var result = '';
    for (var pi=0; pi<parts.length; pi++) {
      var p = parts[pi].trim();
      if (!p || p === 'endl') continue;
      if (p.charAt(0) === '"' && p.charAt(p.length-1) === '"') { result += p.slice(1,-1).replace(/\\n/g,'\n'); continue; }
      var e2 = p;
      var ks = Object.keys(vars);
      for (var ki=0; ki<ks.length; ki++) {
        e2 = e2.replace(new RegExp('\\b'+ks[ki]+'\\b','g'), JSON.stringify(vars[ks[ki]]));
      }
      e2 = e2.replace(/sqrt\(([^)]+)\)/g, function(_,n){ try{return String(Math.sqrt(Function('"use strict";return('+n+')')()));}catch(err){return n;} });
      try { result += String(Function('"use strict";return('+e2+')')()) ; } catch(err) { result += p; }
    }
    if (result.trim()) addCon(result, 'ok');
  }
}

// =====================================================
//  CONSOLE
// =====================================================
function addCon(txt, type) {
  var c = document.getElementById('gcon');
  var em = c.querySelector('.cempty');
  if (em) c.removeChild(em);
  var txts = txt.split('\n');
  for (var i=0; i<txts.length; i++) {
    if (!txts[i].trim()) continue;
    var d = document.createElement('div');
    d.className = 'cl ' + (type||'ok');
    d.textContent = (type==='er'?'\u2717 ':type==='wa'?'\u26A0 ':'> ') + txts[i];
    c.appendChild(d);
  }
  c.scrollTop = c.scrollHeight;
}
function clearCon() {
  document.getElementById('gcon').innerHTML = '<div class="cempty">// apasa Run &amp; Check</div>';
}

// =====================================================
//  EDITOR
// =====================================================
function updateLN() {
  var val = document.getElementById('ged').value;
  var n = val.split('\n').length;
  var s = '';
  for (var i=1; i<=n; i++) s += i + '\n';
  document.getElementById('lnums').textContent = s;
  document.getElementById('g-lines').textContent = n + ' linii';
}
function edChange() { updateLN(); }
function edKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.slice(0,s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
    updateLN();
  }
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); doRun(); }
}

// =====================================================
//  FX
// =====================================================
function flashEl(c) {
  var el = document.getElementById('game');
  el.classList.remove('flash-g','flash-r');
  void el.offsetWidth;
  el.classList.add('flash-' + c);
  setTimeout(function(){ el.classList.remove('flash-g','flash-r'); }, 500);
}
function toast(msg, c) {
  var t = document.createElement('div');
  t.className = 'toast-msg ' + c;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 2500);
}
